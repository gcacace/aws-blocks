name: BlocksDemo
options:
  bundleIdPrefix: com.blocksdemo
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""

targets:
  BlocksDemo:
    type: application
    platform: iOS
    sources:
      - path: .
        excludes:
          - project.yml
          - "*.xcodeproj/**"
          - Info.plist
    info:
      path: Info.plist
      properties:
        CFBundleName: Blocks Demo
        CFBundleDisplayName: Blocks Demo
        CFBundleIdentifier: com.blocksdemo.app
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        CFBundlePackageType: APPL
        CFBundleExecutable: BlocksDemo
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.blocksdemo.app
        INFOPLIST_FILE: Info.plist
        GENERATE_INFOPLIST_FILE: false
        PRODUCT_NAME: BlocksDemo
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
