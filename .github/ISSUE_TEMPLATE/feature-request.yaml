name: Feature Request
description: Suggest an idea to help us improve AWS Blocks
labels: ["feature-request", "pending-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to submit a feature request! We love hearing from the community about how we can make AWS Blocks better.

  - type: dropdown
    id: category
    attributes:
      label: Which area does this feature relate to?
      description: Select the area(s) most relevant to your request.
      multiple: true
      options:
        - Core runtime
        - Building Blocks (existing)
        - Building Blocks (new)
        - create-blocks-app CLI
        - Type safety / codegen
        - Local development / mocking
        - Deployment
        - Native Client: Kotlin
        - Native Client: Swift
        - Native Client: Dart/Flutter
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the feature you'd like to request
      description: |
        A clear and concise description of what you want to happen. Please include **any related issues**, documentation, etc.
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: |
        Please describe the problem you're trying to solve or the use case this feature would enable.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: |
        If you have a solution in mind, please describe it. Code snippets, API sketches, or links to reference implementations are welcome.
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: |
        A description of any alternative solutions or workarounds you've considered.
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: |
        Add any other context, mockups, or examples about the feature request here.
    validations:
      required: false

  - type: checkboxes
    attributes:
      label: Is this something you'd be interested in working on?
      options:
        - label: I may be able to implement this feature request
        - label: This feature might incur a breaking change
