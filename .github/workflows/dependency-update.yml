name: Weekly Dependency Update

on:
  schedule:
    - cron: '0 5 * * 6' # Saturday 5am UTC — PR ready for Monday AM Berlin
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-deps:
    name: Bump Dependencies
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: '--test-reporter=spec'
      HUSKY: '0'
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - run: npm install -g npm-check-updates

      - name: Bump root + workspace packages
        run: ncu -u --root --workspaces

      - name: Bump templates
        run: |
          for dir in packages/create-blocks-app/templates/*/; do
            echo "Updating $dir"
            ncu -u --cwd "$dir"
          done

      - name: Install and build
        run: |
          npm install
          npm run build

      - name: Verify with local e2e
        run: npm run test:e2e:local

      - name: Create PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="chore/dependency-update-$(date +%Y-%m-%d)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add -A
          if git diff --cached --quiet; then
            echo "No dependency changes found."
            exit 0
          fi
          git commit -m "chore: weekly dependency bump $(date +%Y-%m-%d)"
          git push -u origin "$BRANCH"
          gh pr create \
            --title "chore: weekly dependency bump $(date +%Y-%m-%d)" \
            --body "Automated aggressive dependency bump via \`npm-check-updates\`.

          **Scope:** root, all workspace packages, and templates.

          Build and local e2e passed. Please review and merge." \
            --base main
