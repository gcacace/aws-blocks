name: Publish to npm

# Manually triggered. The branch you select in the "Run workflow" dropdown
# is the branch that gets built and published (github.ref_name).
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Dry run (pack & validate only, nothing is published)
        type: boolean
        default: true

concurrency:
  group: publish-npm-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  id-token: write # required for npm provenance on real publishes
  contents: read

jobs:
  publish-npm:
    name: Publish to npm (${{ inputs.dry_run && 'dry-run' || 'LIVE' }})
    runs-on: ubuntu-latest
    environment: publish
    env:
      NODE_OPTIONS: '--test-reporter=spec'
      HUSKY: '0'
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: npm
          # Wires NODE_AUTH_TOKEN into the registry auth used by `npm publish`.
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            npm run publish:npm -- --dry-run
          else
            npm run publish:npm
          fi

      - name: Summary
        if: always()
        run: |
          MODE="${{ inputs.dry_run == true && 'Dry run (nothing published)' || 'LIVE publish' }}"
          echo "## Publish to npm" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Mode:** $MODE" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Branch:** \`${{ github.ref_name }}\`" >> "$GITHUB_STEP_SUMMARY"
