name: Publish Kotlin to Maven Central

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Run publish without uploading
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: macos-latest
    environment: publish-maven
    defaults:
      run:
        working-directory: native/kotlin
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@9632e9a60248a7e85f8d6c7f51208c2a1859e905 # v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Fetch credentials and write Gradle properties
        run: |
          MAVEN_SECRET=$(aws secretsmanager get-secret-value \
            --secret-id awsmobilesdk/android/sonatype_central_portal \
            --query SecretString --output text)
          SIGNING_SECRET=$(aws secretsmanager get-secret-value \
            --secret-id awsmobilesdk/android/signing \
            --query SecretString --output text)

          PROPS="$HOME/.gradle/gradle.properties"
          mkdir -p "$(dirname "$PROPS")"

          # jq -r unescapes the JSON \\n to literal \n text on a single line.
          # Java Properties.load() interprets \n as a real newline, so the
          # signing plugin receives a properly formatted multiline PGP key.
          {
            printf 'mavenCentralUsername=%s\n' "$(printf '%s' "$MAVEN_SECRET" | jq -r .username)"
            printf 'mavenCentralPassword=%s\n' "$(printf '%s' "$MAVEN_SECRET" | jq -r .password)"
            printf 'signingInMemoryKeyId=%s\n' "$(printf '%s' "$SIGNING_SECRET" | jq -r .keyId)"
            printf 'signingInMemoryKeyPassword=%s\n' "$(printf '%s' "$SIGNING_SECRET" | jq -r .password)"
            printf 'signingInMemoryKey=%s\n' "$(printf '%s' "$SIGNING_SECRET" | jq -r .inMemoryKey)"
          } >> "$PROPS"

      - name: Publish to Maven Central
        if: inputs.dry_run != true
        run: ./gradlew publishAllPublicationsToMavenCentralRepository

      - name: Publish dry-run
        if: inputs.dry_run == true
        run: ./gradlew publishToMavenLocal
