name: Invalidate Registry Cache

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Package name (e.g. core) or "*" for all packages'
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  invalidate:
    name: Invalidate CloudFront Cache
    runs-on: ubuntu-latest
    environment: publish
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Invalidate cache
        env:
          CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}
          PACKAGE: ${{ inputs.package }}
        run: |
          if [[ "$PACKAGE" == "*" ]]; then
            PATHS="/registry/*"
            echo "Invalidating all registry paths..."
          else
            if [[ ! "$PACKAGE" =~ ^[a-zA-Z0-9_-]+$ ]]; then
              echo "::error::Invalid package name"
              exit 1
            fi
            PATHS="/registry/@aws-blocks/${PACKAGE}/*"
            echo "Invalidating paths for @aws-blocks/${PACKAGE}..."
          fi

          aws cloudfront create-invalidation \
            --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" \
            --paths "$PATHS"

          echo "## Cache Invalidated" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Paths:** \`${PATHS}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Propagation takes 30-60 seconds. Consumers should run:" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "npm cache clean --force && npm install" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
